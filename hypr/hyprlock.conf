# ~/.config/hypr/hyprlock.conf

general {
    disable_loading_bar = false
    grace = 5
    hide_cursor = true
}

background {
    monitor =
    path = /usr/share/backgrounds/wp1.png
    blur_passes = 2
    blur_size = 8
    noise = 0.01
    contrast = 0.9
    brightness = 0.8
    vibrancy = 0.2
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 1.0)
    font_size = 64
    font_family = Sans
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(200, 200, 200, 1.0)
    font_size = 20
    font_family = Sans
    position = 0, 20
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.3)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgba(255, 255, 255, 1.0)
    fade_on_empty = false
    rounding = 10
    placeholder_text = <i>Enter Password...</i>
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
}

